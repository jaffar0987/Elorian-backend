{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ELORIAN LOGIN</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    background:#000;
    color:white;
    font-family:Georgia, serif;
    display:flex;
    justify-content:center;
    align-items:center;
}

.login-box{
    width:420px;
    padding:45px;
    border:1px solid rgba(255,215,0,.25);
    box-shadow:0 0 40px rgba(255,215,0,.12);
    text-align:center;
}

.login-box h1{
    letter-spacing:8px;
    font-size:34px;
    font-weight:300;
    margin-bottom:10px;
}

.login-box h2{
    color:gold;
    letter-spacing:4px;
    font-size:18px;
    margin-bottom:35px;
    font-weight:300;
}

.input-group{
    text-align:left;
    margin-bottom:22px;
}

.input-group label{
    display:block;
    color:lightgray;
    margin-bottom:8px;
    letter-spacing:2px;
    font-size:14px;
}

.input-group input{
    width:100%;
    padding:14px;
    background:transparent;
    border:1px solid rgba(255,215,0,.3);
    color:white;
    outline:none;
    font-size:16px;
}

.input-group input:focus{
    border-color:gold;
}

.login-btn{
    width:100%;
    padding:14px;
    margin-top:10px;
    background:gold;
    color:black;
    border:none;
    letter-spacing:3px;
    cursor:pointer;
    font-weight:bold;
}

.login-btn:hover{
    background:white;
}

#error{
    color:red;
    margin-top:15px;
    font-size:14px;
}

.bg-image{
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: blur(5px);
    z-index: -2;
}

body::before{
    content: "";
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: -1;
}

/* ================= RESPONSIVE ================= */

@media (max-width:768px){

    body{
        padding:30px 20px;
    }

    .login-box{
        width:100%;
        max-width:420px;
        padding:35px 30px;
    }

    .login-box h1{
        font-size:30px;
        letter-spacing:6px;
    }

    .login-box h2{
        font-size:16px;
        letter-spacing:3px;
        margin-bottom:28px;
    }

    .input-group label{
        font-size:13px;
    }

    .input-group input{
        padding:13px;
        font-size:15px;
    }

    .login-btn{
        padding:13px;
        font-size:14px;
    }

    .bg-image{
        filter:blur(4px);
    }
}

@media (max-width:480px){

    body{
        padding:20px 15px;
    }

    .login-box{
        width:100%;
        padding:28px 20px;
    }

    .login-box h1{
        font-size:26px;
        letter-spacing:4px;
    }

    .login-box h2{
        font-size:15px;
        letter-spacing:2px;
        margin-bottom:24px;
    }

    .input-group{
        margin-bottom:18px;
    }

    .input-group label{
        font-size:12px;
    }

    .input-group input{
        padding:12px;
        font-size:14px;
    }

    .login-btn{
        padding:12px;
        font-size:13px;
        letter-spacing:2px;
    }

    #error{
        font-size:13px;
    }

    .bg-image{
        filter:blur(3px);
    }
}
</style>
</head>

<body>

<img src="{% static 'img/logo.png' %}" class="bg-image">

<div class="login-box">

    <h1>ELORIAN</h1>
    <h2>SIGN IN</h2>

    <form id="loginForm" onsubmit="loginvalidation(); return false;">

        <div class="input-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="Enter your email">
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Enter your password">
        </div>

        <button type="submit" class="login-btn">LOGIN</button>

        <p id="error"></p>

    </form>

</div>

<script>
    function loginvalidation(){
    var email = document.getElementById("email").value;
    var password = document.getElementById("password").value;
    if(email == "" || password == ""){
        document.getElementById("error").innerHTML = "Please fill all fields";
    }
    else{
        if(email == "admin@gmail.com"){
            if(password == "12345"){
               window.location.href = "{% url 'address' %}";
            }
            else{
                document.getElementById("error").innerHTML = "Invalid Password";
            }
        }
        else{
            document.getElementById("error").innerHTML = "Invalid Email";
        }
    }
}
</script>

</body>
</html>

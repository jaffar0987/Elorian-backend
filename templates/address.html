{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELORIAN ADDRESS</title>
    <style>
    *{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    font-family:Georgia, serif;
    color:white;
}

/*  NAVBAR  */

nav{
    width:100%;
    padding:30px 70px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-bottom:1px solid rgba(255,215,0,.15);
}

.logo{
    color:white;
    font-size:38px;
    letter-spacing:8px;
    font-weight:300;
}

.logo sub{
    color:gold;
    font-size:12px;
    letter-spacing:6px;
    margin-left:5px;
}

.nav-links a{
    color:white;
    text-decoration:none;
    margin-left:40px;
    font-size:14px;
    letter-spacing:3px;
    transition:.3s;
}

.nav-links a:hover{
    color:gold;
}

/* ADDRESS SECTION  */

.address-section{
    width:100%;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:60px 20px;
}

.address-container{
    width:900px;
    background:#111;
    border:1px solid rgba(255,215,0,.2);
    border-radius:20px;
    padding:50px;
    box-shadow:0 0 35px rgba(255,215,0,.08);
}

.address-container h1{
    color:gold;
    font-size:40px;
    letter-spacing:4px;
    margin-bottom:15px;
}

.address-container p{
    color:#d4d4d4;
    margin-bottom:35px;
    letter-spacing:1px;
}

/*  FORM INPUTS  */

form{
    display:grid;
    grid-template-columns:repeat(2, 1fr);
    gap:25px;
}

form input,
form select{
    width:100%;
    padding:16px 18px;
    background:#050505;
    color:white;
    border:1px solid rgba(255,215,0,.25);
    border-radius:10px;
    font-size:15px;
    font-family:Georgia, serif;
    outline:none;
    letter-spacing:1px;
}

form input::placeholder{
    color:#aaa;
}

form input:focus,
form select:focus{
    border-color:gold;
    box-shadow:0 0 15px rgba(255,215,0,.18);
}

button{
    grid-column:1 / 3;
    padding:17px;
    margin-top:10px;
    background:gold;
    color:black;
    border:none;
    border-radius:30px;
    font-size:15px;
    letter-spacing:3px;
    cursor:pointer;
    font-family:Georgia, serif;
    transition:.4s;
}

button:hover{
    background:black;
    color:gold;
    border:1px solid gold;
}

/* TABLET RESPONSIVE  */

@media(max-width:768px){

    nav{
        padding:25px 25px;
        flex-direction:column;
        gap:20px;
        text-align:center;
    }

    .logo{
        font-size:28px;
        letter-spacing:5px;
    }

    .logo sub{
        font-size:9px;
        letter-spacing:3px;
    }

    .nav-links a{
        margin:0 10px;
        font-size:11px;
        letter-spacing:2px;
    }

    .address-section{
        padding:45px 20px;
    }

    .address-container{
        width:100%;
        padding:35px 25px;
    }

    .address-container h1{
        font-size:30px;
    }

    form{
        grid-template-columns:1fr;
    }

    button{
        grid-column:1 / 2;
    }
}

/* MOBILE RESPONSIVE  */

@media(max-width:480px){

    nav{
        padding:20px 15px;
        gap:18px;
    }

    .logo{
        font-size:24px;
        letter-spacing:4px;
        text-align:center;
    }

    .logo sub{
        display:block;
        margin-top:6px;
        margin-left:0;
        font-size:9px;
        letter-spacing:2px;
    }

    .nav-links{
        display:flex;
        flex-direction:column;
        align-items:center;
        gap:14px;
    }

    .nav-links a{
        margin:0;
        font-size:12px;
        letter-spacing:2px;
    }

    .address-section{
        min-height:auto;
        padding:30px 15px;
    }

    .address-container{
        padding:25px 18px;
        border-radius:15px;
    }

    .address-container h1{
        font-size:25px;
        letter-spacing:2px;
        text-align:center;
    }

    .address-container p{
        text-align:center;
        font-size:14px;
        margin-bottom:25px;
    }

    form{
        gap:18px;
    }

    form input,
    form select{
        padding:14px;
        font-size:14px;
    }

    button{
        padding:15px;
        font-size:13px;
        letter-spacing:2px;
    }
}
</style>
</head>
<body>
   
<nav>
    <div class="logo">
        ELORIAN
        <sub>SINCE 1775</sub>
    </div>

    <div class="nav-links">
        <a href="index.html">HOME</a>
        <a href="collection.html">COLLECTION</a>
        <a href="theartofelorian.html">THE ART OF ELORIAN</a>
        <a href="contact.html">CONTACT</a>
    </div>
</nav>

<section class="address-section">

    <div class="address-container">

        <h1>Delivery Address</h1>
        <p>Please provide your shipping details.</p>

       <form id="addressForm" method="post">
    {% csrf_token %}

            <input type="text" id="fullname" placeholder="Full Name" name="fullname">

            <input type="tel" id="mobile" placeholder="Mobile Number" name="mobile">

            <input type="email" id="email" placeholder="Email Address" name="email">

            <input type="text" id="address1" placeholder="Address Line 1" name="address1">

            <input type="text" id="address2" placeholder="Address Line 2" name="address2">

            <input type="text" id="landmark" placeholder="Landmark" name="landmark">

            <input type="text" id="city" placeholder="City" name="city">

            <input type="text" id="state" placeholder="State" name="state">

            <input type="number" id="pincode" placeholder="Pincode" name="pincode">

            <select id="country">
                <option>India</option>
                <option>America</option>
                <option>Russia</option>
                <option>Saudi Arabia</option>
                <option>England</option>
                <option>Dubai</option>
                <option>Oman</option>
                <option>Finland</option>
                <option>France</option>
                <option>Nigeria</option>
                <option>Japan</option>
                <option>China</option>
                <option>Italy</option>
            </select>

            <button type="submit">
                Continue to Payment
            </button>

        </form>

    </div>

</section>

</body>
</html>
